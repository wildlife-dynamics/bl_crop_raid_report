      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Get user name to use on template 
    id: get_user_name 
    task: get_current_user
    partial: 
      client: ${{ workflow.er_client_name.return }}
  
  - name: Get user full name 
    id: get_fullname 
    task: get_user_full_name 
    partial: 
      user: ${{ workflow.get_user_name.return }}

  - name: Add outputs generated to template and persist 
