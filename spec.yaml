id: bl_crop_raid_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.39.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mep
    version: "0.12.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ate
    version: "0.0.2.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-big-life
    version: "0.0.9.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  # Set workflow details 
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details
  
  # Define time range 
  - name: Set Report Time Range
    id: time_range
    task: set_time_range

  # Define groupers 
  - name: Set Data Grouping
    id: groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: "ts_month_name"

  #  Connect to ER 
  - name: Connect to EarthRanger
    id: er_client_name 
    task: set_er_connection

  # Set basemaps connection 
  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck
    partial:
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 20
        - url: >-
            https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
          opacity: 0.15
          max_zoom: 20

  - name: Download amboseli conservancy layers
    id: ambo_ranch_layers
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/wrcp3pnnxqyrclzmbtt1r/amboseli_ranch_conservancies_layers.gpkg?rlkey=jfbqj1b1nwhijxbsy7b2v1d29&st=d7rbqdfe&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3 
      unzip: false 
  
  - name: Download amboseli ranch boundaries and electric fence
    id: ambo_bound_fence 
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/k6dgrmxmxeb3fe6glihwa/amboseli_group_ranch_boundaries_x_electric_fence.gpkg?rlkey=limtzffe88lr0iof5kf3b6uoy&st=rreho3tq&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Download Amboseli Conservancies
    id: ambo_conservancies 
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/blo1smf49buhwx24y4z60/amboseli_group_ranch_boundaries.gpkg?rlkey=w86emavj8ug7zab73ifbzg6jv&st=v8uptlb0&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Load amboseli conservancy layers 
    id: load_ambo_layers 
    task: load_df 
    partial:  
      file_path: ${{ workflow.ambo_ranch_layers.return }}
      layer: null 
      deserialize_json: false 

  - name: Load amboseli ranch boundaries and electric fence 
    id: load_ambo_boundaries_fence 
    task: load_df 
    partial: 
      file_path: ${{ workflow.ambo_bound_fence.return }}
      layer: null 
      deserialize_json: false 
  
  - name: Load amboseli conservancies 
    id: load_ambo_conservancies 
    task: load_df 
    partial: 
      file_path: ${{ workflow.ambo_conservancies.return }}
      layer: null 
      deserialize_json: false 

  - name: Reproject Amboseli Conservancy Layers to WGS84
    id: reproject_ambo_layers 
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_layers.return }}
      target_crs: "EPSG:4326"

  - name: Reproject Amboseli Ranch Boundaries and Electric Fence to WGS84
    id: reproject_ambo_boundaries 
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_boundaries_fence.return }}
      target_crs: "EPSG:4326"

  - name: Reproject Amboseli Conservancies to WGS84
    id: reproject_ambo_conservancies
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_conservancies.return }}
      target_crs: "EPSG:4326"

  - name: Split Amboseli Layers by Land Use
    id: split_ambo_layers_use 
    task: split_gdf_by_column
    partial: 
      gdf: ${{ workflow.reproject_ambo_layers.return }}
      column: land_use

  - name: Annotate Amboseli Layers with Geometry Type
    id: annotate_ambo_layers_gdf_dict 
    task: annotate_gdf_dict_with_geom_type
    partial:  
      gdf_dict: ${{ workflow.split_ambo_layers_use.return }}

  - name: Create styled layers from split amboseli layers 
    id: create_ambo_layers_styled 
    task: create_deckgl_layers_from_gdf_dict
    partial: 
      gdf_dict: ${{ workflow.annotate_ambo_layers_gdf_dict.return }}
      styles: 
        Rangeland:
          extruded: false
          get_fill_color: [163, 156, 145]
          get_line_color: [163, 156, 145]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Rangeland and settlement:
          extruded: false
          get_fill_color: [255, 160, 122]
          get_line_color: [255, 160, 122]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Settlement and agriculture:
          extruded: false
          get_fill_color: [47, 79, 79]
          get_line_color: [47, 79, 79]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Conservancies:
          extruded: false
          get_fill_color: [143, 188, 139]
          get_line_color: [143, 188, 139]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        National parks and reserves:
          extruded: false
          get_fill_color: [77, 102, 0]
          get_line_color: [77, 102, 0]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

      legends: 
        title: Map Layers 
        values: 
          - label: Conservancies 
            color: "#8fbc8b"

          - label: National park and reserves
            color: "#4d6600"

          - label: Settlement and agriculture 
            color: "#2f4f4f"

          - label: Rangeland 
            color: "#a39c91"

          - label: Rangeland and settlement 
            color: "#ffa07a"

  - name: Split Amboseli Electric Fence and Boundaries by Land Use
    id: split_ambo_boundaries
    task: split_gdf_by_column
    partial:  
      gdf: ${{ workflow.reproject_ambo_boundaries.return }}
      column: land_use 

  - name: Annotate Amboseli Boundaries and Electric Fence with Geometry Type
    id: annotate_ambo_boundaries 
    task: annotate_gdf_dict_with_geom_type
    partial: 
      gdf_dict: ${{ workflow.split_ambo_boundaries.return }}

  - name: Create styled layers from split amboseli boundaries and electric fence 
    id: create_ambo_boundaries_styled 
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_ambo_boundaries.return }}
      styles: 
        Ranch boundaries: 
          extruded: false 
          get_color: [0, 0, 0]
          get_line_width: 0.95
          get_width: 0.95
          stroked: true 
          filled: false
          opacity: 0.55

        Electric Fence:
          extruded: false 
          get_color: [45, 98, 177]
          get_width: 5.5 
          stroked: true 
          filled: false 
          opacity: 1.0

      legends: 
        title: ""
        values: 
          - label: Electric fence
            color: "#2d62b1"

          - label: Ranch boundaries
            color: "#000000"

  - name: Retrieve current events 
    id: get_crop_events
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details

      event_types:
        - hwc_crop_raids
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: true
  
  - name: Process crop raid events details
    id: process_crop_details
    task: process_events_details 
    partial: 
      df: ${{ workflow.get_crop_events.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true 

  - name: Normalize Crop Event Column Names
    id: normalize_crop_events 
    task: normalize_json_column
    partial:
      column: event_details
      df: ${{ workflow.process_crop_details.return }}
      skip_if_not_exists: true 
      sort_columns: true 

  - name: Drop column prefix from events
    id: drop_crop_prefix 
    task: drop_column_prefix
    partial: 
      df: ${{ workflow.normalize_crop_events.return }}
      prefix: event_details__
      duplicate_strategy: keep_original 

  - name: Rename and Filter Event Columns
    id: map_crop_columns 
    task: map_columns
    partial: 
      df: ${{ workflow.drop_crop_prefix.return }}
      drop_columns: [
        "event_category", 
        "event_type", 
        "reported_by",
        "event_type_display",
        ]
      retain_columns: []
      rename_columns: {}
      raise_if_not_found: true

  - name: Convert columns to float 
    id: convert_col_float 
    task: convert_to_float
    partial: 
      df: ${{ workflow.map_crop_columns.return }}
      columns: ["Damage size"]
      errors: "coerce"
      fill_value: 0 
      inplace: true 
      
  - name: Convert columns to int 
    id: convert_col_int 
    task: convert_to_int 
    partial: 
      df: ${{ workflow.convert_col_float.return }}
      columns: ["Number of animals"]
      errors: "coerce"
      fill_value: 0 
      inplace: true 
      
  - name: Extract date attributes 
    id: extract_date
    task: decompose_datetime
    partial: 
      df: ${{ workflow.convert_col_int.return }}
      datetime_column: "Date and time of raid"
      components: ["month","month_name","hour"]
      column_prefix: "ts"
      remove_source: false

  - name: Assign custom time bins 
    id: assign_custom_bins 
    task: assign_time_bins 
    partial: 
      df: ${{ workflow.extract_date.return }}
      hours: 3 
      hour_col: ts_hour

  # Draw time bin bar chart 
  - name: Aggregate events by time density_bins
    id: aggregate_time_bins 
    task: aggregate_by 
    partial: 
      df: ${{ workflow.assign_custom_bins.return }}
      group_col: "time_bin"
      agg_col: null 
      agg_func: "count"
      agg_col_name: "Count"
      add_percent: false 
      sort: null

  - name: Draw time bin bar chart 
    id: draw_time_bin_chart
    task: draw_custom_bar_chart 
    partial: 
      dataframe: ${{ workflow.aggregate_time_bins.return }}
      category: time_bin 
      category_order: [
        "12:01 – 15:00",
        "15:01 – 18:00",
        "18:01 – 21:00",
        "21:01 – 00:00",
        "00:00 – 03:00",
        "03:01 – 06:00",
        "06:01 – 09:00",
        "09:01 – 12:00",
        ]
      bar_chart_configs: 
        - column: Count
          agg_func: sum 
          label: Percent 
          show_label: true 
      
      layout_kwargs:
        font_size: 12 
        plot_bgcolor: "#f5f5f5"
        showlegend: false 
        xaxis:
          title: "Time of day"
        yaxis:
          title: "Number of incidents"

  - name: Persist time bin bar chart as html text 
    id: persist_time_bin_chart 
    task: persist_text 
    partial: 
      text: ${{ workflow.draw_time_bin_chart.return }}
      filename: "time_bin_bar_chart.html"
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: null 

  - name: Convert time bins chart to png
    id: time_bin_png
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_time_bin_chart.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 5
        max_concurrent_pages: 1

  - name: Filter df to only acres 
    id: filter_overall_acres 
    task: filter_row_values 
    partial: 
      df: ${{ workflow.assign_custom_bins.return }}
      column: "Measurement unit"
      values: ["Acre"]
  
  - name: Draw boxplot of damage size 
    id: draw_damage_boxplot 
    task: draw_boxplot 
    partial:
      dataframe: ${{ workflow.filter_overall_acres.return }}
      y_column: "Damage size"
      x_column: "Time of ranger response"
      color_column: null
      orientation: "v"
      boxmode: "group"
      show_points: false 
      plot_style:
        marker_colors: [ "#7eb0d5" ]
      layout_style:
        showlegend: false
        bargap: 0.1 
        font_size: 12 
        font_color: "#222222"

  - name: Persist damage boxplot as html text
    id: persist_damage_boxplot
    task: persist_text  
    partial: 
      text: ${{ workflow.draw_damage_boxplot.return }}
      filename: "damage_size_boxplot.html"
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: null
  
  - name: Convert boxplot chart to png
    id: boxplot_png
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_damage_boxplot.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 5
        max_concurrent_pages: 1

  - name: Map column values to assign crop raid location colors 
    id: assign_column_colors
    task: map_color_column_value
    partial:
      df: ${{ workflow.assign_custom_bins.return }}
      col: "Crop raid location"
      mapping: 
        "Core AOO": "#a6cee3"
        "Non-core AOO": "#b2df8a"
        "Outside AOO": "#fdbf6f"
        "Unknown": "#cfcfc4"
      new_col: "crop_raid_location_colors"
  
  - name: Draw custom stacked bar chart of crop raid locations over time 
    id: draw_month_raid_locs
    task: draw_custom_stacked_bar_chart 
    partial: 
      dataframe: ${{ workflow.assign_column_colors.return }}
      x_axis: "ts_month_name"
      y_axis: "ts_month"
      stack_column: "Crop raid location"
      agg_function: "count"
      color_column: "crop_raid_location_colors"
      stack_order:  [
        "Core AOO",
        "Non-core AOO",
        "Outside AOO"
        ]
      category_order: [
          "January", 
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December"
      ]
      plot_style: 
        xperiodalignment: "middle"
      
      layout_style: 
        font_size: 12 
        font_color: "#222222"
        plot_bgcolor: "#f5f5f5"
        title_x: 0.5
        xaxis:
          title: "Month"
        yaxis:
          title: "Number of incidents"
        showlegend: true
        bargap: 0.1

  - name: Persist custom stacked bar chart as html text
    id: persist_month_raid_locs
    task: persist_text
    partial:
      text: ${{ workflow.draw_month_raid_locs.return }}
      filename: "monthly_crop_raid_location_incidents.html"
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: null

  - name: Convert month raid chart to png
    id: month_stacked_locs_png
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_month_raid_locs.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 5
        max_concurrent_pages: 1

  - name: Filter core area and where damage occured 
    id: filter_core_aoo 
    task: filter_row_values
    partial:
      df: ${{ workflow.assign_column_colors.return }}
      column: "Crop raid location"
      values: ["Core AOO"]
  
  - name: Filter damage from core aoo
    id: filter_damage_core_aoo
    task: filter_row_values
    partial:
      df: ${{ workflow.filter_core_aoo.return }}
      column: "Damage caused"
      values: ["Yes"]

  - name: Aggregate total land damage in core aoo 
    id: aggregate_damage_core_aoo
    task: aggregate_by
    partial:
      df: ${{ workflow.filter_damage_core_aoo.return }}
      group_col: "ts_month_name"
      agg_col: "Damage size"
      agg_func: "sum"
      agg_col_name: "Total Damage Size"
      add_percent: true 
      sort: null
  
  - name: Map color columns to assign to crop destroyed 
    id: assign_crop_colors
    task: map_color_column_value
    partial:
      df: ${{ workflow.filter_damage_core_aoo.return }}
      col: "Main crop destroyed"
      mapping:
        "Avocado":       "#b3e2cd"
        "Banana":        "#fdcdac"
        "Beans":         "#cbd5e8"
        "Butternut":     "#f4cae4"
        "Cabbages":      "#e6f5c9"
        "Capsicum":      "#fff2ae"
        "Cassava":       "#f1e2cc"
        "French beans":  "#cccccc"
        "Grapes":        "#fbb4ae"
        "Green gram":    "#b3cde3"
        "Kales":         "#ccebc5"
        "Maize":         "#decbe4"
        "Onion":         "#fed9a6"
        "Oranges":       "#ffffcc"
        "Pawpaw":        "#e5d8bd"
        "Peas":          "#fddaec"
        "Potatoes":      "#d9f0d3"
        "Pumpkin":       "#fde8c8"
        "Sisal":         "#dce9f5"
        "Sugarcane":     "#f5e6f0"
        "Sunflower":     "#fefbd8"
        "Tomatoes":      "#fcd5ce"
        "Watermelon":    "#d4ede8"
        "Other":         "#e8e8e8"
        "None":          "#ffffff"
      new_col: "crop_destroyed_colors"
  
  - name: Get crop destroyed incidents over time 
    id: aggregate_crop_destroyed 
    task: aggregate_by 
    partial: 
      df: ${{ workflow.assign_crop_colors.return }}
      group_col: "Main crop destroyed"
      agg_col: null
      agg_func: "count"
      agg_col_name: "Count"
      add_percent: true
      sort: null

  - name: Map crop color values on aggregated df 
    id: map_crop_colors_agg
    task: map_color_column_value
    partial:
      df: ${{ workflow.aggregate_crop_destroyed.return }}
      col: "Main crop destroyed"
      mapping:
        "Avocado":       "#b3e2cd"
        "Banana":        "#fdcdac"
        "Beans":         "#cbd5e8"
        "Butternut":     "#f4cae4"
        "Cabbages":      "#e6f5c9"
        "Capsicum":      "#fff2ae"
        "Cassava":       "#f1e2cc"
        "French beans":  "#cccccc"
        "Grapes":        "#fbb4ae"
        "Green gram":    "#b3cde3"
        "Kales":         "#ccebc5"
        "Maize":         "#decbe4"
        "Onion":         "#fed9a6"
        "Oranges":       "#ffffcc"
        "Pawpaw":        "#e5d8bd"
        "Peas":          "#fddaec"
        "Potatoes":      "#d9f0d3"
        "Pumpkin":       "#fde8c8"
        "Sisal":         "#dce9f5"
        "Sugarcane":     "#f5e6f0"
        "Sunflower":     "#fefbd8"
        "Tomatoes":      "#fcd5ce"
        "Watermelon":    "#d4ede8"
        "Other":         "#e8e8e8"
        "None":          "#ffffff"
      new_col: "crop_destroyed_colors"

  - name: Draw pie chart of crop destroyed 
    id: draw_crop_destroyed_pie
    task: draw_pie_chart 
    partial: 
      dataframe: ${{ workflow.map_crop_colors_agg.return }}
      label_column: "Main crop destroyed"
      value_column: "Count"
      color_column: "crop_destroyed_colors"
      plot_style:
        textinfo: "percent"
      
      layout_style:
        showlegend: true
        font_size: 12 
        font_style: normal 
  
  - name: Persist crop destroyed pie chart as html text
    id: persist_crop_destroyed_pie
    task: persist_text
    partial:
      text: ${{ workflow.draw_crop_destroyed_pie.return }}
      filename: "proportion_crop_species_targeted.html"
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: null

  - name: Convert crops destroyed pie chart to png
    id: crops_destroyed_pie_png
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_crop_destroyed_pie.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 5
        max_concurrent_pages: 1

  - name: Filter acres from core aoo where damage occured 
    id: filter_core_acres_damage 
    task: filter_row_values
    partial: 
      df: ${{ workflow.filter_damage_core_aoo.return }}
      column: "Measurement unit"
      values: ["Acre"]
  
  - name: Aggregate main crop destroyed by damage size  
    id: aggregate_crop_damage
    task: aggregate_by
    partial: 
      df: ${{ workflow.filter_core_acres_damage.return }}
      group_col: "Main crop destroyed"
      agg_col: "Damage size"
      agg_func: "sum"
      agg_col_name: "Total Damage Size"
      add_percent: true
      sort: null
  
  - name: Map crop colors to damage size aggregated df
    id: map_crop_colors_damage_agg
    task: map_color_column_value
    partial:
      df: ${{ workflow.aggregate_crop_damage.return }}
      col: "Main crop destroyed"
      mapping:
        "Avocado":       "#b3e2cd"
        "Banana":        "#fdcdac"
        "Beans":         "#cbd5e8"
        "Butternut":     "#f4cae4"
        "Cabbages":      "#e6f5c9"
        "Capsicum":      "#fff2ae"
        "Cassava":       "#f1e2cc"
        "French beans":  "#cccccc"
        "Grapes":        "#fbb4ae"
        "Green gram":    "#b3cde3"
        "Kales":         "#ccebc5"
        "Maize":         "#decbe4"
        "Onion":         "#fed9a6"
        "Oranges":       "#ffffcc"
        "Pawpaw":        "#e5d8bd"
        "Peas":          "#fddaec"
        "Potatoes":      "#d9f0d3"
        "Pumpkin":       "#fde8c8"
        "Sisal":         "#dce9f5"
        "Sugarcane":     "#f5e6f0"
