        get_fill_color: density_bins_colors
        get_line_color: density_bins_colors
        opacity: 0.55 
        get_line_width: 0.25
        get_elevation: 0
        get_point_radius: 1
        line_width_units: pixels 
        line_width_scale: 1 
        line_width_min_pixels: 1
        line_width_max_pixels: 5

      legend: 
        title: Density
        label_column: density_bins
        color_column: density_bins_colors
