  - name: Remove invalid points from events
    id: remove_invalid_geoms
    task: ecoscope_workflows_ext_custom.tasks.transformation.drop_null_geometry
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      gdf: ${{ workflow.exclude_event_outliers.return }}
      geometry_column: geometry 

  - name: Generate response event scatterplot layer
    id: generate_response_layer
    task: create_scatterplot_layer
    skipif:
      conditions: 
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: timing_of_response_colors
        get_line_color: [0, 0, 0]
        get_line_width: 0.25
        get_radius : 4
        opacity: 0.75
        stroked: true
      legend: 
        title: "Time of ranger response"
        label_column: "Time of ranger response"
        color_column: "timing_of_response_colors"
        sort: ascending
        label_suffix: null
      geodataframe: ${{ workflow.remove_invalid_geoms.return }}

  - name: Overlay response Events on Amboseli Map
    id: combine_ambo_lvs_layers
    task: combine_deckgl_map_layers
    partial: 
      static_layers: 
        - ${{ workflow.create_ambo_layers_styled.return }}
        - ${{ workflow.create_ambo_boundaries_styled.return }}
      grouped_layers: 
        - ${{ workflow.generate_response_layer.return }}

  - name: Calculate Zoom Level for response Event Map
    id: response_zoom_value
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.remove_invalid_geoms.return }}

  - name: Draw response  event map
    id: draw_response_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_ambo_lvs_layers.return }}
      view_state: ${{ workflow.response_zoom_value.return }} 

  - name: Persist response  event map
    id: persist_response_map
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_response_map.return }}
      filename: timing_of_response_event_map.html  # -- convert this to png

  - name: Convert response  event map to png
    id: convert_response_map_png
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_response_map.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1

